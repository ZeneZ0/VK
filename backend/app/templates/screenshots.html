<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отправить скрины в ТГ | VK Manager</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .dropzone {
            border: 2px dashed #007bff;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            background: #f8f9fa;
            cursor: pointer;
            transition: background 0.2s;
            margin: 20px 0;
        }
        .dropzone:hover {
            background: #e9ecef;
        }
        .dropzone.dragover {
            background: #d4edda;
            border-color: #28a745;
        }
        .file-list {
            margin: 20px 0;
        }
        .file-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 8px;
            background: white;
        }
        .file-name {
            flex: 1;
        }
        .file-size {
            color: #666;
            margin-right: 15px;
        }
        .remove-file {
            color: #dc3545;
            cursor: pointer;
            font-weight: bold;
        }
        .radio-group {
            margin: 20px 0;
        }
        .radio-option {
            margin: 10px 0;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
        }
        .radio-option.selected {
            border-color: #007bff;
            background: #f0f7ff;
        }
        .sidebar ul li a {
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .loading-spinner {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        .bots-info {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="container">
            <div class="sidebar">
                <h3>VK Manager</h3>
                <ul>
                    <li><a href="/dashboard">Главная</a></li>
                    <li><a href="/profile">Редактировать профиль</a></li>
                    <li class="active"><a href="/screenshots">Отправить скрины в тг</a></li>
                    <li><a href="/tokens">Управление VK токенами</a></li>
                    <li><a href="/posts">Создать посты</a></li>
                    <li><a href="/reposts_wall">Создать репосты (на стену)</a></li>
                    <li><a href="/reposts_dm">Создать репосты (в лс)</a></li>
                    <li><a href="/comments">Создать комментарии</a></li>
                    <li><a href="/likes">Поставить лайки</a></li>
                    <li><a href="/subscribe_group">Подписаться на группу</a></li>
                    <li><a href="/statistics">Статистика</a></li>
                    <li><a href="/subscribe">💳 Подписка</a></li>
                </ul>
            </div>

            <div class="content" id="screenshots-content">
                <div id="screenshots-data" class="loading-spinner">⏳ Загрузка...</div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script>
        let selectedFiles = [];
        let distributionMode = 'fair';
        let bots = [];
        let loading = false;
        let sending = false;
        let hasAccess = false;  // для баннера

        (async function() {
            const token = getToken();
            if (!token) {
                window.location.href = '/login';
                return;
            }

            // Проверяем подписку (для баннера)
            try {
                const checkResponse = await fetchWithAuth('/api/subscriptions/check');
                const checkData = await checkResponse.json();
                hasAccess = checkData.has_access;  // true для ADMIN или при активной подписке
                
                if (!checkData.has_access && !checkData.is_admin) {
                    alert('Для доступа к этой странице необходимо оформить подписку');
                    window.location.href = '/subscribe';
                    return;
                }
            } catch (e) {
                console.error('Ошибка проверки подписки', e);
            }

            await loadBots();
            render();
        })();

        async function loadBots() {
            loading = true;
            render();
            
            try {
                const response = await fetchWithAuth('/api/bots');
                if (response.ok) {
                    bots = await response.json();
                }
            } catch (e) {
                console.error('Ошибка загрузки ботов', e);
            } finally {
                loading = false;
                render();
            }
        }

        function render() {
            const container = document.getElementById('screenshots-data');
            const activeBots = bots.filter(b => b.status === 'active');
            const botCount = activeBots.length;
            
            if (loading) {
                container.innerHTML = `<div class="loading-spinner">⏳ Загрузка ботов...</div>`;
                return;
            }
            
            let filesHtml = '';
            if (selectedFiles.length === 0) {
                filesHtml = '<p>Файлы не выбраны</p>';
            } else {
                filesHtml = '<div class="file-list">';
                selectedFiles.forEach((file, index) => {
                    const size = (file.size / 1024).toFixed(2) + ' KB';
                    filesHtml += `
                        <div class="file-item">
                            <span class="file-name">${escapeHtml(file.name)}</span>
                            <span class="file-size">${size}</span>
                            <span class="remove-file" onclick="removeFile(${index})">✕</span>
                        </div>
                    `;
                });
                filesHtml += '</div>';
            }

            // Информация о распределении
            let distributionInfo = '';
            if (botCount > 0 && selectedFiles.length > 0) {
                if (distributionMode === 'fair') {
                    const filesPerBot = Math.floor(selectedFiles.length / botCount);
                    const remainingFiles = selectedFiles.length % botCount;
                    distributionInfo = `<div class="bots-info">📊 Режим "честный": ${selectedFiles.length} файлов на ${botCount} ботов → по ${filesPerBot} файлов${remainingFiles > 0 ? `, +${remainingFiles} файлов первым ботам` : ''}</div>`;
                } else {
                    distributionInfo = `<div class="bots-info">📊 Режим "1 файл для всех": каждый бот получит 1 файл (всего ${Math.min(selectedFiles.length, botCount)} файлов из ${selectedFiles.length})</div>`;
                }
            }

            container.innerHTML = `
                <h1 class="page-title">Telegram публикация файлов</h1>
                <div class="page-subtitle">Публикуйте файлы через ваших Telegram ботов</div>
                <hr>

                ${!hasAccess ? `
                <div style="background: #fff3cd; border: 1px solid #ffc107; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                    ⚠️ <strong>Подписка истекла</strong><br>
                    Оформите подписку для доступа к сервисам<br>
                    <a href="/subscribe" style="color: #007bff;">Оформить подписку →</a>
                </div>
                ` : ''}

                <div class="bots-info">
                    🤖 Доступно Telegram ботов: ${botCount}
                    ${botCount === 0 ? '<br><span style="color: #dc3545;">⚠️ Нет активных ботов. Добавьте ботов в разделе "Управление VK токенами"</span>' : ''}
                </div>

                <div class="card">
                    <h3>Выберите файлы</h3>
                    <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()">
                        <p>👆 Нажмите или перетащите файлы сюда</p>
                        <p style="color: #666; font-size: 14px; margin-top: 10px;">Поддерживаются: PNG, JPG, GIF, MP4</p>
                    </div>
                    <input type="file" id="fileInput" multiple style="display: none;" accept="image/*,video/*">
                    ${filesHtml}
                </div>

                <div class="card">
                    <h3>Режим распределения</h3>
                    <p>Выберите как распределить файлы между ботами</p>
                    
                    <div class="radio-group">
                        <div class="radio-option ${distributionMode === 'fair' ? 'selected' : ''}" onclick="setMode('fair')">
                            <input type="radio" name="mode" ${distributionMode === 'fair' ? 'checked' : ''}> 
                            <strong>Поступить честно</strong> (кол-во файлов = кол-во ботов)
                        </div>
                        <div class="radio-option ${distributionMode === 'all' ? 'selected' : ''}" onclick="setMode('all')">
                            <input type="radio" name="mode" ${distributionMode === 'all' ? 'checked' : ''}> 
                            <strong>Поступить как пидарас</strong> (1 файл для всех)
                        </div>
                    </div>
                    ${distributionInfo}
                </div>

                <button class="btn" onclick="sendFiles()" style="margin-top: 10px;" ${botCount === 0 || selectedFiles.length === 0 || sending ? 'disabled' : ''}>
                    ${sending ? '⏳ Отправка...' : `📤 Отправить ${selectedFiles.length} файлов через ${botCount} ботов`}
                </button>
            `;

            setupDragAndDrop();
            setupFileInput();
        }

        function setupDragAndDrop() {
            const dropzone = document.getElementById('dropzone');
            if (!dropzone) return;

            dropzone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropzone.classList.add('dragover');
            });

            dropzone.addEventListener('dragleave', () => {
                dropzone.classList.remove('dragover');
            });

            dropzone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropzone.classList.remove('dragover');
                const files = Array.from(e.dataTransfer.files);
                selectedFiles = [...selectedFiles, ...files];
                render();
            });
        }

        function setupFileInput() {
            const fileInput = document.getElementById('fileInput');
            if (fileInput) {
                fileInput.addEventListener('change', (e) => {
                    const files = Array.from(e.target.files);
                    selectedFiles = [...selectedFiles, ...files];
                    render();
                });
            }
        }

        window.removeFile = (index) => {
            selectedFiles.splice(index, 1);
            render();
        };

        window.setMode = (mode) => {
            distributionMode = mode;
            render();
        };

        window.sendFiles = async () => {
            if (selectedFiles.length === 0) {
                alert('Выберите файлы');
                return;
            }
            
            const activeBots = bots.filter(b => b.status === 'active');
            if (activeBots.length === 0) {
                alert('Нет активных ботов');
                return;
            }
            
            const formData = new FormData();
            formData.append('mode', distributionMode);
            
            for (let i = 0; i < selectedFiles.length; i++) {
                formData.append('files', selectedFiles[i]);
            }
            
            const botIds = activeBots.map(b => b.id);
            formData.append('bot_ids', JSON.stringify(botIds));
            
            sending = true;
            render();
            
            try {
                const response = await fetchWithAuth('/api/publish/send_to_telegram', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    let successCount = result.results?.filter(r => r.success).length || 0;
                    let failCount = result.results?.filter(r => !r.success).length || 0;
                    
                    if (successCount > 0) {
                        alert(`✅ Успешно отправлено ${successCount} файлов\n❌ Ошибок: ${failCount}`);
                        selectedFiles = [];
                    } else {
                        alert(`❌ Не удалось отправить файлы\n${result.results?.[0]?.error || 'Неизвестная ошибка'}`);
                    }
                } else {
                    alert(result.detail || 'Ошибка отправки');
                }
            } catch (e) {
                console.error('Ошибка', e);
                alert('Ошибка соединения с сервером');
            } finally {
                sending = false;
                render();
            }
        };
        
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
