<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отправить скрины в ТГ | VK Manager</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .dropzone {
            border: 2px dashed #007bff;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            background: #f8f9fa;
            cursor: pointer;
            transition: background 0.2s;
            margin: 20px 0;
        }
        .dropzone:hover {
            background: #e9ecef;
        }
        .dropzone.dragover {
            background: #d4edda;
            border-color: #28a745;
        }
        .file-list {
            margin: 20px 0;
        }
        .file-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 8px;
            background: white;
        }
        .file-name {
            flex: 1;
        }
        .file-size {
            color: #666;
            margin-right: 15px;
        }
        .remove-file {
            color: #dc3545;
            cursor: pointer;
            font-weight: bold;
        }
        .radio-group {
            margin: 20px 0;
        }
        .radio-option {
            margin: 10px 0;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
        }
        .radio-option.selected {
            border-color: #007bff;
            background: #f0f7ff;
        }
        .sidebar ul li a {
            text-decoration: none;
            color: inherit;
            display: block;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="container">
            <div class="sidebar">
                <h3>VK Manager</h3>
                <ul>
                    <li><a href="/">Главная</a></li>
                    <li><a href="/profile">Редактировать профиль</a></li>
                    <li class="active"><a href="/screenshots">Отправить скрины в тг</a></li>
                    <li><a href="/tokens">Управление VK токенами</a></li>
                    <li><a href="/posts">Создать посты</a></li>
                    <li><a href="/reposts_wall">Создать репосты (на стену)</a></li>
                    <li><a href="/reposts_dm">Создать репосты (в лс)</a></li>
                    <li><a href="/comments">Создать комментарии</a></li>
                    <li><a href="/likes">Поставить лайки</a></li>
                    <li><a href="/subscribe_group">Подписаться на группу</a></li>
                    <li><a href="/statistics">Статистика</a></li>
                </ul>
            </div>

            <div class="content" id="screenshots-content">
                <div id="screenshots-data">Загрузка...</div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script>
        let selectedFiles = [];
        let distributionMode = 'fair';

        (async function() {
            const token = getToken();
            if (!token) {
                window.location.href = '/login';
                return;
            }

            render();
        })();

        function render() {
            const container = document.getElementById('screenshots-data');
            
            let filesHtml = '';
            if (selectedFiles.length === 0) {
                filesHtml = '<p>Файлы не выбраны</p>';
            } else {
                filesHtml = '<div class="file-list">';
                selectedFiles.forEach((file, index) => {
                    const size = (file.size / 1024).toFixed(2) + ' KB';
                    filesHtml += `
                        <div class="file-item">
                            <span class="file-name">${file.name}</span>
                            <span class="file-size">${size}</span>
                            <span class="remove-file" onclick="removeFile(${index})">✕</span>
                        </div>
                    `;
                });
                filesHtml += '</div>';
            }

            container.innerHTML = `
                <h1 class="page-title">Telegram публикация файлов</h1>
                <div class="page-subtitle">Публикуйте файлы через ваших Telegram ботов</div>
                <hr>

                <div style="background: #fff3cd; border: 1px solid #ffc107; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                    ⚠️ <strong>Подписка истекла</strong><br>
                    Оформите подписку для доступа к сервисам<br>
                    <a href="/subscribe" style="color: #007bff;">Оформить подписку →</a>
                </div>

                <div class="card">
                    <h3>Выберите файлы</h3>
                    <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()">
                        <p>👆 Нажмите или перетащите файлы сюда</p>
                        <p style="color: #666; font-size: 14px; margin-top: 10px;">Поддерживаются: PNG, JPG, GIF, MP4</p>
                    </div>
                    <input type="file" id="fileInput" multiple style="display: none;" accept="image/*,video/*">
                    ${filesHtml}
                </div>

                <div class="card">
                    <h3>Режим распределения</h3>
                    <p>Выберите как распределить файлы между ботами</p>
                    
                    <div class="radio-group">
                        <div class="radio-option ${distributionMode === 'fair' ? 'selected' : ''}" onclick="setMode('fair')">
                            <input type="radio" name="mode" ${distributionMode === 'fair' ? 'checked' : ''}> 
                            <strong>Поступить честно</strong> (кол-во файлов = кол-во ботов)
                        </div>
                        <div class="radio-option ${distributionMode === 'all' ? 'selected' : ''}" onclick="setMode('all')">
                            <input type="radio" name="mode" ${distributionMode === 'all' ? 'checked' : ''}> 
                            <strong>Поступить как пидарас</strong> (1 файл для всех)
                        </div>
                    </div>
                </div>

                <button class="btn" onclick="sendFiles()" style="margin-top: 10px;">
                    Отправить ${selectedFiles.length} файлов
                </button>
            `;

            setupDragAndDrop();
            setupFileInput();
        }

        function setupDragAndDrop() {
            const dropzone = document.getElementById('dropzone');
            if (!dropzone) return;

            dropzone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropzone.classList.add('dragover');
            });

            dropzone.addEventListener('dragleave', () => {
                dropzone.classList.remove('dragover');
            });

            dropzone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropzone.classList.remove('dragover');
                const files = Array.from(e.dataTransfer.files);
                selectedFiles = [...selectedFiles, ...files];
                render();
            });
        }

        function setupFileInput() {
            const fileInput = document.getElementById('fileInput');
            if (fileInput) {
                fileInput.addEventListener('change', (e) => {
                    const files = Array.from(e.target.files);
                    selectedFiles = [...selectedFiles, ...files];
                    render();
                });
            }
        }

        window.removeFile = (index) => {
            selectedFiles.splice(index, 1);
            render();
        };

        window.setMode = (mode) => {
            distributionMode = mode;
            render();
        };

        window.sendFiles = () => {
            if (selectedFiles.length === 0) {
                alert('Выберите файлы');
                return;
            }
            alert(`Отправка ${selectedFiles.length} файлов в режиме: ${distributionMode === 'fair' ? 'честном' : 'пидарас'}`);
            selectedFiles = [];
            render();
        };
    </script>
</body>
</html>
