<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статистика | VK Manager</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .overview-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: transform 0.2s;
        }
        .overview-card:hover {
            transform: translateY(-2px);
        }
        .overview-value {
            font-size: 36px;
            font-weight: bold;
            color: #007bff;
            margin: 10px 0;
        }
        .overview-label {
            color: #666;
            font-size: 14px;
        }
        .overview-sub {
            font-size: 12px;
            color: #28a745;
            margin-top: 8px;
        }
        .filters {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
        }
        .filter-group {
            flex: 1;
            min-width: 180px;
        }
        .filter-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }
        .filter-group select, .filter-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .filter-actions {
            display: flex;
            gap: 10px;
        }
        .history-table {
            background: white;
            border-radius: 12px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #555;
        }
        tr:hover {
            background: #f8f9fa;
        }
        .status-success {
            color: #28a745;
            font-weight: 500;
        }
        .status-error {
            color: #dc3545;
        }
        .status-pending {
            color: #ffc107;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            padding: 20px;
        }
        .pagination button {
            padding: 8px 15px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
        }
        .pagination button:hover {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }
        .pagination button.active {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }
        .empty-state {
            text-align: center;
            padding: 50px;
            color: #888;
        }
        .sidebar ul li a {
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .loading-spinner {
            text-align: center;
            padding: 50px;
            color: #666;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="container">
            <div class="sidebar">
                <h3>VK Manager</h3>
                <ul>
                    <li><a href="/dashboard">Главная</a></li>
                    <li><a href="/profile">Редактировать профиль</a></li>
                    <li><a href="/screenshots">Отправить скрины в тг</a></li>
                    <li><a href="/tokens">Управление VK токенами</a></li>
                    <li><a href="/posts">Создать посты</a></li>
                    <li><a href="/reposts_wall">Создать репосты (на стену)</a></li>
                    <li><a href="/reposts_dm">Создать репосты (в лс)</a></li>
                    <li><a href="/comments">Создать комментарии</a></li>
                    <li><a href="/likes">Поставить лайки</a></li>
                    <li><a href="/subscribe_group">Подписаться на группу</a></li>
                    <li class="active"><a href="/statistics">Статистика</a></li>
                    <li><a href="/subscribe">💳 Подписка</a></li>
                </ul>
            </div>

            <div class="content">
                <div id="statistics-content">
                    <div class="loading-spinner">⏳ Загрузка...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script>
        let stats = {
            total_operations: 0,
            successful: 0,
            failed: 0,
            posts_count: 0,
            reposts_wall_count: 0,
            reposts_dm_count: 0,
            comments_count: 0,
            likes_count: 0,
            subscribes_count: 0,
            success_rate: 0
        };
        
        let history = [];
        let currentPage = 1;
        let itemsPerPage = 20;
        let totalPages = 1;
        let loading = false;
        
        let filters = {
            type: 'all',
            date_start: '',
            date_end: ''
        };

        (async function() {
            const token = getToken();
            if (!token) {
                window.location.href = '/login';
                return;
            }

            await loadData();
        })();

        async function loadData() {
            loading = true;
            render();
            
            try {
                // Получаем сводку статистики
                let overviewUrl = '/api/statistics/overview';
                const params = new URLSearchParams();
                if (filters.date_start) params.append('date_start', filters.date_start);
                if (filters.date_end) params.append('date_end', filters.date_end);
                if (params.toString()) overviewUrl += '?' + params.toString();
                
                const overviewResponse = await fetchWithAuth(overviewUrl);
                if (overviewResponse.ok) {
                    stats = await overviewResponse.json();
                }
                
                // Получаем историю операций с пагинацией
                let historyUrl = `/api/statistics/history?page=${currentPage}&limit=${itemsPerPage}`;
                if (filters.type !== 'all') historyUrl += `&operation_type=${filters.type}`;
                if (filters.date_start) historyUrl += `&date_start=${filters.date_start}`;
                if (filters.date_end) historyUrl += `&date_end=${filters.date_end}`;
                
                const historyResponse = await fetchWithAuth(historyUrl);
                if (historyResponse.ok) {
                    history = await historyResponse.json();
                }
                
                // Получаем общее количество для пагинации
                const countResponse = await fetchWithAuth(historyUrl.replace('limit=' + itemsPerPage, 'limit=1'));
                if (countResponse.ok) {
                    // Пагинация будет на основе длины истории, но для реальной пагинации нужен total count
                    // Пока используем длину истории для определения страниц
                    const countData = await countResponse.json();
                    totalPages = Math.ceil((countData.length || history.length) / itemsPerPage);
                }
            } catch (e) {
                console.error('Ошибка загрузки статистики', e);
            } finally {
                loading = false;
                render();
            }
        }

        function applyFilters() {
            currentPage = 1;
            loadData();
        }

        function resetFilters() {
            filters = {
                type: 'all',
                date_start: '',
                date_end: ''
            };
            document.getElementById('filter_type').value = 'all';
            document.getElementById('filter_date_start').value = '';
            document.getElementById('filter_date_end').value = '';
            loadData();
        }

        function goToPage(page) {
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            loadData();
        }

        function getStatusBadge(status) {
            if (status === 'success') return '<span class="status-success">✅ Успешно</span>';
            if (status === 'error') return '<span class="status-error">❌ Ошибка</span>';
            return '<span class="status-pending">⏳ В процессе</span>';
        }

        function formatDate(dateString) {
            if (!dateString) return '—';
            const date = new Date(dateString);
            return date.toLocaleString('ru-RU', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function getOperationTypeName(type) {
            const names = {
                'post': 'Создание поста',
                'repost_wall': 'Репост на стену',
                'repost_dm': 'Репост в ЛС',
                'comment': 'Комментарий',
                'like': 'Лайк',
                'subscribe': 'Подписка на группу'
            };
            return names[type] || type;
        }

        function render() {
            const container = document.getElementById('statistics-content');
            
            if (loading) {
                container.innerHTML = `<div class="loading-spinner">⏳ Загрузка статистики...</div>`;
                return;
            }
            
            const totalReposts = (stats.reposts_wall_count || 0) + (stats.reposts_dm_count || 0);
            
            container.innerHTML = `
                <h1 class="page-title">Статистика</h1>
                <div class="page-subtitle">Аналитика публикаций и репостов через ваших ботов</div>
                <hr>

                <div style="background: #fff3cd; border: 1px solid #ffc107; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                    ⚠️ <strong>Подписка истекла</strong><br>
                    Оформите подписку для доступа к сервисам<br>
                    <a href="/subscribe" style="color: #007bff;">Оформить подписку →</a>
                </div>

                <!-- Общая статистика -->
                <div class="stats-overview">
                    <div class="overview-card">
                        <div class="overview-label">Всего операций</div>
                        <div class="overview-value">${stats.total_operations || 0}</div>
                        <div class="overview-sub">Постов: ${stats.posts_count || 0}</div>
                    </div>
                    <div class="overview-card">
                        <div class="overview-label">Успешных операций</div>
                        <div class="overview-value">${stats.successful || 0}</div>
                        <div class="overview-sub">Ошибок: ${stats.failed || 0}</div>
                    </div>
                    <div class="overview-card">
                        <div class="overview-label">Процент успеха</div>
                        <div class="overview-value">${stats.success_rate || 0}%</div>
                        <div class="overview-sub">Постов / Репостов</div>
                    </div>
                    <div class="overview-card">
                        <div class="overview-label">Всего действий</div>
                        <div class="overview-value" style="font-size: 28px;">📝 ${stats.posts_count || 0}</div>
                        <div class="overview-sub">🔄 ${totalReposts} | 💬 ${stats.comments_count || 0} | ❤️ ${stats.likes_count || 0}</div>
                    </div>
                </div>

                <!-- Фильтры -->
                <div class="filters">
                    <div class="filter-group">
                        <label>Тип операции</label>
                        <select id="filter_type">
                            <option value="all" ${filters.type === 'all' ? 'selected' : ''}>Все операции</option>
                            <option value="post" ${filters.type === 'post' ? 'selected' : ''}>Создание постов</option>
                            <option value="repost_wall" ${filters.type === 'repost_wall' ? 'selected' : ''}>Репосты (на стену)</option>
                            <option value="repost_dm" ${filters.type === 'repost_dm' ? 'selected' : ''}>Репосты (в ЛС)</option>
                            <option value="comment" ${filters.type === 'comment' ? 'selected' : ''}>Комментарии</option>
                            <option value="like" ${filters.type === 'like' ? 'selected' : ''}>Лайки</option>
                            <option value="subscribe" ${filters.type === 'subscribe' ? 'selected' : ''}>Подписки</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Дата начала</label>
                        <input type="date" id="filter_date_start" value="${filters.date_start}">
                    </div>
                    <div class="filter-group">
                        <label>Дата окончания</label>
                        <input type="date" id="filter_date_end" value="${filters.date_end}">
                    </div>
                    <div class="filter-actions">
                        <button class="btn" id="apply_filters_btn">Применить</button>
                        <button class="btn" id="reset_filters_btn" style="background: #6c757d;">Сбросить</button>
                    </div>
                </div>

                <!-- История операций -->
                <h3 style="margin: 20px 0 15px 0;">📋 История операций</h3>
                
                ${history.length === 0 ? `
                    <div class="empty-state">
                        <div style="font-size: 48px; margin-bottom: 15px;">📊</div>
                        <p>Нет операций для отображения</p>
                        <p style="font-size: 14px;">Попробуйте изменить фильтры</p>
                    </div>
                ` : `
                    <div class="history-table">
                        <table>
                            <thead>
                                <tr>
                                    <th>Дата и время</th>
                                    <th>Тип операции</th>
                                    <th>Бот</th>
                                    <th>Детали</th>
                                    <th>Статус</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${history.map(item => `
                                    <tr>
                                        <td>${formatDate(item.created_at)}</td>
                                        <td>${getOperationTypeName(item.operation_type)}</td>
                                        <td>${escapeHtml(item.bot_name || '—')}</td>
                                        <td style="max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${escapeHtml(item.details || '—')}</td>
                                        <td>${getStatusBadge(item.status)}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                    
                    ${totalPages > 1 ? `
                        <div class="pagination">
                            <button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>←</button>
                            ${[...Array(Math.min(5, totalPages))].map((_, i) => {
                                let pageNum;
                                if (totalPages <= 5) {
                                    pageNum = i + 1;
                                } else if (currentPage <= 3) {
                                    pageNum = i + 1;
                                } else if (currentPage >= totalPages - 2) {
                                    pageNum = totalPages - 4 + i;
                                } else {
                                    pageNum = currentPage - 2 + i;
                                }
                                return `<button onclick="goToPage(${pageNum})" class="${currentPage === pageNum ? 'active' : ''}">${pageNum}</button>`;
                            }).join('')}
                            <button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>→</button>
                        </div>
                    ` : ''}
                `}

                <div class="info-block" style="margin-top: 30px;">
                    <h4>📌 О статистике:</h4>
                    <p>• Общая статистика показывает суммарные данные по всем операциям за выбранный период</p>
                    <p>• История операций отображает детальную информацию о каждой операции</p>
                    <p>• При прокрутке вниз автоматически загружаются следующие операции (пагинация)</p>
                    <p>• Вы можете редактировать текст постов в VK и удалять операции</p>
                </div>
            `;
            
            document.getElementById('apply_filters_btn')?.addEventListener('click', () => {
                filters.type = document.getElementById('filter_type').value;
                filters.date_start = document.getElementById('filter_date_start').value;
                filters.date_end = document.getElementById('filter_date_end').value;
                applyFilters();
            });
            
            document.getElementById('reset_filters_btn')?.addEventListener('click', resetFilters);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        window.goToPage = goToPage;
    </script>
</body>
</html>
