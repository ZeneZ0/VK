<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статистика | VK Manager</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .overview-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: transform 0.2s;
        }
        .overview-card:hover {
            transform: translateY(-2px);
        }
        .overview-value {
            font-size: 36px;
            font-weight: bold;
            color: #007bff;
            margin: 10px 0;
        }
        .overview-label {
            color: #666;
            font-size: 14px;
        }
        .overview-sub {
            font-size: 12px;
            color: #28a745;
            margin-top: 8px;
        }
        .filters {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
        }
        .filter-group {
            flex: 1;
            min-width: 180px;
        }
        .filter-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }
        .filter-group select, .filter-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .filter-actions {
            display: flex;
            gap: 10px;
        }
        .history-table {
            background: white;
            border-radius: 12px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #555;
        }
        tr:hover {
            background: #f8f9fa;
        }
        .status-success {
            color: #28a745;
            font-weight: 500;
        }
        .status-error {
            color: #dc3545;
        }
        .status-pending {
            color: #ffc107;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            padding: 20px;
        }
        .pagination button {
            padding: 8px 15px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
        }
        .pagination button:hover {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }
        .pagination button.active {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }
        .empty-state {
            text-align: center;
            padding: 50px;
            color: #888;
        }
        .sidebar ul li a {
            text-decoration: none;
            color: inherit;
            display: block;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="container">
            <div class="sidebar">
                <h3>VK Manager</h3>
                <ul>
                    <li><a href="/dashboard">Главная</a></li>
                    <li><a href="/profile">Редактировать профиль</a></li>
                    <li><a href="/screenshots">Отправить скрины в тг</a></li>
                    <li><a href="/tokens">Управление VK токенами</a></li>
                    <li><a href="/posts">Создать посты</a></li>
                    <li><a href="/reposts_wall">Создать репосты (на стену)</a></li>
                    <li><a href="/reposts_dm">Создать репосты (в лс)</a></li>
                    <li><a href="/comments">Создать комментарии</a></li>
                    <li><a href="/likes">Поставить лайки</a></li>
                    <li><a href="/subscribe_group">Подписаться на группу</a></li>
                    <li class="active"><a href="/statistics">Статистика</a></li>
                </ul>
            </div>

            <div class="content">
                <div id="statistics-content">
                    <div class="loading-spinner">⏳ Загрузка...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script>
        let stats = {
            total_operations: 0,
            successful: 0,
            failed: 0,
            posts_count: 0,
            reposts_count: 0,
            comments_count: 0,
            likes_count: 0,
            success_rate: 0
        };
        
        let history = [];
        let filteredHistory = [];
        let currentPage = 1;
        let itemsPerPage = 20;
        let loading = false;
        
        let filters = {
            type: 'all',
            date_start: '',
            date_end: ''
        };

        (async function() {
            const token = getToken();
            if (!token) {
                window.location.href = '/login';
                return;
            }

            await loadData();
            render();
        })();

        async function loadData() {
            loading = true;
            render();
            
            try {
                // TODO: заменить на реальные API запросы
                // const statsResponse = await fetchWithAuth('/api/statistics');
                // stats = await statsResponse.json();
                // const historyResponse = await fetchWithAuth('/api/statistics/history');
                // history = await historyResponse.json();
                
                // Пока имитация данных
                stats = {
                    total_operations: 1247,
                    successful: 1189,
                    failed: 58,
                    posts_count: 342,
                    reposts_count: 567,
                    comments_count: 189,
                    likes_count: 149,
                    success_rate: 95.3
                };
                
                // Имитация истории операций
                const types = ['post', 'repost_wall', 'repost_dm', 'comment', 'like', 'subscribe'];
                const typeNames = {
                    post: 'Создание поста',
                    repost_wall: 'Репост на стену',
                    repost_dm: 'Репост в ЛС',
                    comment: 'Комментарий',
                    like: 'Лайк',
                    subscribe: 'Подписка на группу'
                };
                const statuses = ['success', 'error', 'pending'];
                
                for (let i = 0; i < 50; i++) {
                    const type = types[Math.floor(Math.random() * types.length)];
                    const status = statuses[Math.floor(Math.random() * 10)]; // больше успешных
                    const date = new Date();
                    date.setDate(date.getDate() - Math.floor(Math.random() * 30));
                    
                    history.push({
                        id: i + 1,
                        type: type,
                        type_name: typeNames[type],
                        status: status === 0 ? 'success' : (status === 1 ? 'error' : 'success'),
                        details: type === 'post' ? 'Пост: "Пример текста поста..."' : 
                                 type === 'repost_wall' ? 'Репост: https://vk.com/wall-123_456' :
                                 type === 'like' ? 'Лайк: https://vk.com/wall-123_456' :
                                 'Операция выполнена',
                        created_at: date.toISOString(),
                        bot_name: `Бот ${Math.floor(Math.random() * 5) + 1}`
                    });
                }
                
                // Сортируем по дате (новые сверху)
                history.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                
                applyFilters();
            } catch (e) {
                console.error('Ошибка загрузки статистики', e);
            } finally {
                loading = false;
                render();
            }
        }

        function applyFilters() {
            filteredHistory = history.filter(item => {
                if (filters.type !== 'all' && item.type !== filters.type) return false;
                
                if (filters.date_start) {
                    const itemDate = new Date(item.created_at);
                    const startDate = new Date(filters.date_start);
                    if (itemDate < startDate) return false;
                }
                
                if (filters.date_end) {
                    const itemDate = new Date(item.created_at);
                    const endDate = new Date(filters.date_end);
                    endDate.setHours(23, 59, 59);
                    if (itemDate > endDate) return false;
                }
                
                return true;
            });
            
            currentPage = 1;
            render();
        }

        function resetFilters() {
            filters = {
                type: 'all',
                date_start: '',
                date_end: ''
            };
            applyFilters();
        }

        function getPaginatedHistory() {
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            return filteredHistory.slice(start, end);
        }

        function getTotalPages() {
            return Math.ceil(filteredHistory.length / itemsPerPage);
        }

        function goToPage(page) {
            currentPage = page;
            render();
        }

        function getStatusBadge(status) {
            if (status === 'success') return '<span class="status-success">✅ Успешно</span>';
            if (status === 'error') return '<span class="status-error">❌ Ошибка</span>';
            return '<span class="status-pending">⏳ В процессе</span>';
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('ru-RU', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function render() {
            const container = document.getElementById('statistics-content');
            const paginatedHistory = getPaginatedHistory();
            const totalPages = getTotalPages();
            
            if (loading) {
                container.innerHTML = `<div class="loading-spinner">⏳ Загрузка статистики...</div>`;
                return;
            }
            
            container.innerHTML = `
                <h1 class="page-title">Статистика</h1>
                <div class="page-subtitle">Аналитика публикаций и репостов через ваших ботов</div>
                <hr>

                <div style="background: #fff3cd; border: 1px solid #ffc107; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                    ⚠️ <strong>Подписка истекла</strong><br>
                    Оформите подписку для доступа к сервисам<br>
                    <a href="/subscribe" style="color: #007bff;">Оформить подписку →</a>
                </div>

                <!-- Общая статистика -->
                <div class="stats-overview">
                    <div class="overview-card">
                        <div class="overview-label">Всего операций</div>
                        <div class="overview-value">${stats.total_operations}</div>
                        <div class="overview-sub">Постов: ${stats.posts_count}</div>
                    </div>
                    <div class="overview-card">
                        <div class="overview-label">Успешных операций</div>
                        <div class="overview-value">${stats.successful}</div>
                        <div class="overview-sub">Ошибок: ${stats.failed}</div>
                    </div>
                    <div class="overview-card">
                        <div class="overview-label">Процент успеха</div>
                        <div class="overview-value">${stats.success_rate}%</div>
                        <div class="overview-sub">Постов / Репостов</div>
                    </div>
                    <div class="overview-card">
                        <div class="overview-label">Всего действий</div>
                        <div class="overview-value" style="font-size: 28px;">📝 ${stats.posts_count}</div>
                        <div class="overview-sub">🔄 ${stats.reposts_count} | 💬 ${stats.comments_count} | ❤️ ${stats.likes_count}</div>
                    </div>
                </div>

                <!-- Фильтры -->
                <div class="filters">
                    <div class="filter-group">
                        <label>Тип операции</label>
                        <select id="filter_type">
                            <option value="all" ${filters.type === 'all' ? 'selected' : ''}>Все операции</option>
                            <option value="post" ${filters.type === 'post' ? 'selected' : ''}>Создание постов</option>
                            <option value="repost_wall" ${filters.type === 'repost_wall' ? 'selected' : ''}>Репосты (на стену)</option>
                            <option value="repost_dm" ${filters.type === 'repost_dm' ? 'selected' : ''}>Репосты (в ЛС)</option>
                            <option value="comment" ${filters.type === 'comment' ? 'selected' : ''}>Комментарии</option>
                            <option value="like" ${filters.type === 'like' ? 'selected' : ''}>Лайки</option>
                            <option value="subscribe" ${filters.type === 'subscribe' ? 'selected' : ''}>Подписки</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Дата начала</label>
                        <input type="date" id="filter_date_start" value="${filters.date_start}">
                    </div>
                    <div class="filter-group">
                        <label>Дата окончания</label>
                        <input type="date" id="filter_date_end" value="${filters.date_end}">
                    </div>
                    <div class="filter-actions">
                        <button class="btn" id="apply_filters_btn">Применить</button>
                        <button class="btn" id="reset_filters_btn" style="background: #6c757d;">Сбросить</button>
                    </div>
                </div>

                <!-- История операций -->
                <h3 style="margin: 20px 0 15px 0;">📋 История операций</h3>
                
                ${filteredHistory.length === 0 ? `
                    <div class="empty-state">
                        <div style="font-size: 48px; margin-bottom: 15px;">📊</div>
                        <p>Нет операций для отображения</p>
                        <p style="font-size: 14px;">Попробуйте изменить фильтры</p>
                    </div>
                ` : `
                    <div class="history-table">
                        <table>
                            <thead>
                                <tr>
                                    <th>Дата и время</th>
                                    <th>Тип операции</th>
                                    <th>Бот</th>
                                    <th>Детали</th>
                                    <th>Статус</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${paginatedHistory.map(item => `
                                    <tr>
                                        <td>${formatDate(item.created_at)}</td>
                                        <td>${item.type_name}</td>
                                        <td>${item.bot_name}</td>
                                        <td style="max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${item.details}</td>
                                        <td>${getStatusBadge(item.status)}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                    
                    ${totalPages > 1 ? `
                        <div class="pagination">
                            <button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>←</button>
                            ${[...Array(Math.min(5, totalPages))].map((_, i) => {
                                let pageNum;
                                if (totalPages <= 5) {
                                    pageNum = i + 1;
                                } else if (currentPage <= 3) {
                                    pageNum = i + 1;
                                } else if (currentPage >= totalPages - 2) {
                                    pageNum = totalPages - 4 + i;
                                } else {
                                    pageNum = currentPage - 2 + i;
                                }
                                return `<button onclick="goToPage(${pageNum})" class="${currentPage === pageNum ? 'active' : ''}">${pageNum}</button>`;
                            }).join('')}
                            <button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>→</button>
                        </div>
                    ` : ''}
                `}

                <div class="info-block" style="margin-top: 30px;">
                    <h4>📌 О статистике:</h4>
                    <p>• Общая статистика показывает суммарные данные по всем операциям за выбранный период</p>
                    <p>• История операций отображает детальную информацию о каждой операции</p>
                    <p>• При прокрутке вниз автоматически загружаются следующие операции (пагинация)</p>
                    <p>• Вы можете редактировать текст постов в VK и удалять операции</p>
                </div>
            `;
            
            document.getElementById('apply_filters_btn')?.addEventListener('click', () => {
                filters.type = document.getElementById('filter_type').value;
                filters.date_start = document.getElementById('filter_date_start').value;
                filters.date_end = document.getElementById('filter_date_end').value;
                applyFilters();
            });
            
            document.getElementById('reset_filters_btn')?.addEventListener('click', resetFilters);
        }
        
        window.goToPage = goToPage;
    </script>
</body>
</html>
